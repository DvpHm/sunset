<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ODE · 견적서</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/quote.css">
</head>
<body>
<div class="topbar">
  <div class="top">
    <h1>QUOTE</h1>
    <span class="sub">견적서 생성</span>
  </div>
  <div class="tb-spacer"></div>
  <button class="btn btn-ghost" onclick="render()">↻ 미리보기</button>
  <select id="qFmt" class="btn btn-ghost" style="padding:9px 12px;cursor:pointer;"><option value="png">PNG</option><option value="pdf">PDF</option></select>
  <button class="btn btn-dl" onclick="download()">⬇ 저장</button>
</div>
<div class="wrap">
  <div>
    <div class="panel">
      <div class="panel-h">📋 의뢰 불러오기</div>
      <label class="fl">대시보드에서 선택</label>
      <select class="f" id="commPick" onchange="loadComm()"><option value="">— 직접 입력 —</option></select>
      <div class="qhint">대시보드에 등록된 의뢰를 고르면 자동으로 채워져요.<br>없으면 아래에서 직접 입력하세요.</div>
    </div>
    <div class="panel" style="margin-top:14px">
      <div class="panel-h">✏ 견적 내용</div>
      <label class="fl">받는 분 (닉네임)</label><input class="f" id="qClient" value="" oninput="render()" placeholder="클라이언트 닉네임">
      <label class="fl">제목 / 유형</label><input class="f" id="qType" value="" placeholder="리깅 의뢰" oninput="render()">
      <label class="fl">항목</label>
      <div id="liBox"></div>
      <button class="mini mini-add" onclick="addLi()">＋ 항목 추가</button>
      <label class="fl" style="margin-top:13px">비고 (선택)</label>
      <textarea class="f" id="qNote" oninput="render()" placeholder="입금 계좌, 작업 기간 등"></textarea>
    </div>
  </div>
  <div class="preview-wrap">
    <canvas id="cv" width="920" height="1000"></canvas>
    <div class="qhint" style="text-align:center">⬆ 미리보기 · PNG/PDF 선택 후 "저장"</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/quote.js"></script>
</body>
</html>
